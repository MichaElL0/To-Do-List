<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>To do List</title>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>To-Do or not</h1>
        </header>

        <nav class="sidebar">
            <ul class="filter-list">
                <li class="filter-item"><button type="button"><img src="./images/calendar-month.svg" alt="All icon">All</button></li>
                <li class="filter-item"><button type="button"><img src="./images/calendar-today.svg" alt="Today icon">Today</button></li>
                <li class="filter-item"><button type="button"><img src="./images/calendar-week.svg" alt="Week icon">Week</button></li>
                <li class="filter-item"><button type="button"><img src="./images/calendar-star.svg" alt="Important icon">Important</button></li>
                <li class="filter-item"><button type="button"><img src="./images/calendar-check.svg" alt="Completed icon">Completed</button></li>
            </ul>

            <div class="side-bar-projects">
                <h3>Projects</h3>
                
                <div class="projects-container">
                    <div class="project-card">
                        <button type="button" class="project-select">
                            <p>Project 33</p>
                        </button>
                        <div class="project-buttons">
                            <button type="button" class="modify-btn">
                                <img src="./images/file-document-edit-outline.svg" alt="Project edit icon">
                            </button>
                            <button type="button" class="delete-btn">
                                <img src="./images/trash-can-outline.svg" alt="Trash can icon">
                            </button>
                        </div>
                    </div>

                    <!-- <div class="project-card">
                        <button type="button" class="project-select">
                            <p>Project 2</p>
                        </button>
                        <div class="project-buttons">
                            <button type="button" class="modify-btn">
                                Modify
                                
                            </button>
                            <button type="button" class="delete-btn">
                                Delete
                                
                            </button>
                        </div>
                    </div> -->

                    <button type="button" id="new-project-btn">New Project +</button>
                    
                </div>
            </div>
        </nav>

        <main>
            <div id="task-header">
                <h2>All Tasks</h2>
            </div>
        </main>
    </div>
</body>
</html>
